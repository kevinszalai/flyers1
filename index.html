<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UA Flyers — Universal Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --azul:#00528F;--teal:#008091;--oscuro:#002447;
  --cyan:#00C4DF;--fucsia:#ff436e;
  --bg:#f0f4f8;--white:#fff;
  --gl:#e8edf3;--gm:#b0bec8;--gd:#4a5568;--text:#1a2332;
  --r:14px;--rs:8px;
  --sh:0 4px 20px rgba(0,36,71,.10);--shl:0 8px 40px rgba(0,36,71,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--gl);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,36,71,.06);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--azul),var(--teal));border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:800;}
.topbar-title{font-size:15px;font-weight:700;color:var(--oscuro);}
.topbar-title span{font-weight:400;color:var(--gd);font-size:12px;margin-left:4px;}
.btn-admin{background:none;border:1.5px solid var(--gl);border-radius:7px;padding:6px 12px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--gd);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
.btn-admin:hover{border-color:var(--azul);color:var(--azul);}

/* GALLERY */
#screen-app{flex-direction:column;}
.app-body{flex:1;padding:28px;max-width:1200px;margin:0 auto;width:100%;}
.section-header{margin-bottom:22px;}
.section-title{font-size:22px;font-weight:700;color:var(--oscuro);}
.section-sub{font-size:13px;color:var(--gd);margin-top:3px;}
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.filter-chip{padding:5px 14px;border-radius:18px;border:1.5px solid var(--gl);background:var(--white);font-size:11px;font-weight:500;color:var(--gd);cursor:pointer;transition:all .15s;font-family:'Poppins',sans-serif;}
.filter-chip:hover{border-color:var(--azul);color:var(--azul);}
.filter-chip.active{background:var(--azul);border-color:var(--azul);color:white;}
.flyers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.flyer-card{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;}
.flyer-card:hover{transform:translateY(-4px);box-shadow:var(--shl);}
.flyer-thumb{width:100%;aspect-ratio:9/16;object-fit:cover;display:block;background:var(--gl);}
.flyer-thumb-ph{width:100%;aspect-ratio:9/16;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--gm);font-size:11px;}
.flyer-thumb-canvas{width:100%;aspect-ratio:var(--aspect,9/16);display:block;}
.flyer-card-body{padding:12px;}
.flyer-card-name{font-size:12px;font-weight:600;color:var(--oscuro);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.flyer-card-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;background:rgba(0,82,143,.08);color:var(--azul);}
.flyer-overlay{position:absolute;inset:0;background:rgba(0,36,71,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:var(--r);}
.flyer-card:hover .flyer-overlay{opacity:1;}
.flyer-overlay-btn{background:white;color:var(--azul);border:none;border-radius:7px;padding:9px 18px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gd);}
.empty-state p{font-size:13px;margin-top:10px;}

/* EDITOR */
#screen-editor{flex-direction:column;}
.editor-layout{display:grid;grid-template-columns:1fr 300px;flex:1;height:calc(100vh - 60px);}
.editor-canvas-area{background:#1e2433;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;}
.canvas-wrap-view{position:relative;box-shadow:0 8px 40px rgba(0,0,0,.45);}
#view-canvas{display:block;max-height:calc(100vh - 108px);width:auto;}

.editor-side{background:var(--white);border-left:1px solid var(--gl);display:flex;flex-direction:column;overflow:hidden;}
.editor-side-header{padding:14px 18px;border-bottom:1px solid var(--gl);display:flex;align-items:center;gap:8px;}
.editor-side-header h2{font-size:13px;font-weight:700;color:var(--oscuro);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-back{background:none;border:none;cursor:pointer;color:var(--gd);display:flex;align-items:center;gap:4px;font-family:'Poppins',sans-serif;font-size:11px;padding:5px 7px;border-radius:6px;transition:background .15s;flex-shrink:0;}
.btn-back:hover{background:var(--gl);}

.editable-fields{flex:1;overflow-y:auto;padding:18px;}
.field-section{margin-bottom:20px;}
.field-section-title{font-size:9px;font-weight:700;color:var(--gm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.field-item{margin-bottom:14px;}
.field-label{font-size:10px;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block;}
.field-input{width:100%;padding:8px 11px;border:1.5px solid var(--gl);border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,82,143,.08);}
.field-textarea{width:100%;padding:8px 11px;border:1.5px solid var(--gl);border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;resize:vertical;min-height:54px;transition:border-color .2s;}
.field-textarea:focus{border-color:var(--azul);}
.field-color{display:flex;align-items:center;gap:8px;}
.field-color input[type=color]{width:36px;height:30px;padding:1px 2px;border:1.5px solid var(--gl);border-radius:6px;cursor:pointer;}
.field-color span{font-size:11px;color:var(--gd);}
.field-img-upload{border:2px dashed var(--gl);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.field-img-upload:hover{border-color:var(--azul);background:rgba(0,82,143,.02);}
.field-img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.field-img-upload p{font-size:11px;color:var(--gd);margin-top:4px;}
.img-preview{width:100%;height:56px;object-fit:contain;border-radius:5px;border:1px solid var(--gl);background:var(--gl);display:none;margin-bottom:6px;}
.no-editable{text-align:center;padding:30px 16px;color:var(--gm);font-size:12px;}

.editor-actions{padding:14px 18px;border-top:1px solid var(--gl);display:flex;flex-direction:column;gap:8px;}
.btn-download{background:linear-gradient(135deg,var(--azul),var(--teal));color:white;border:none;border-radius:var(--rs);padding:12px 16px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;}
.btn-download:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,82,143,.3);}
.btn-reset{background:var(--gl);color:var(--gd);border:none;border-radius:var(--rs);padding:8px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;}
.btn-reset:hover{background:#d8e2ec;}

/* ADMIN MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,36,71,.55);z-index:500;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.active{display:flex;}
.modal{background:white;border-radius:20px;padding:36px;width:100%;max-width:340px;box-shadow:var(--shl);text-align:center;}
.modal-logo{width:50px;height:50px;background:linear-gradient(135deg,var(--azul),var(--teal));border-radius:13px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;font-weight:800;margin:0 auto 18px;}
.modal h3{font-size:16px;font-weight:700;color:var(--oscuro);margin-bottom:5px;}
.modal p{font-size:12px;color:var(--gd);margin-bottom:18px;}
.modal-input{width:100%;padding:12px;border:1.5px solid var(--gl);border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:22px;font-weight:700;text-align:center;letter-spacing:8px;color:var(--oscuro);outline:none;margin-bottom:10px;transition:border-color .2s;}
.modal-input:focus{border-color:var(--azul);}
.modal-err{font-size:11px;color:var(--fucsia);margin-bottom:8px;min-height:16px;}
.btn-modal{width:100%;padding:11px;background:linear-gradient(135deg,var(--azul),var(--teal));color:white;border:none;border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-bottom:6px;}
.btn-modal:hover{opacity:.9;}
.btn-modal-ghost{background:none;border:none;font-family:'Poppins',sans-serif;font-size:11px;color:var(--gd);cursor:pointer;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--gl);border-radius:2px;}
</style>
</head>
<body>

<!-- GALLERY -->
<div id="screen-app" class="screen active">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">ua</div>
      <div class="topbar-title">Kit de Flyers <span>/ Comerciales</span></div>
    </div>
    <button class="btn-admin" onclick="openAdminModal()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Admin
    </button>
  </div>

  <div class="app-body">
    <div class="section-header">
      <h1 class="section-title">Elegí un diseño</h1>
      <p class="section-sub">Seleccioná el flyer que querés personalizar y descargar</p>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" data-cat="all" onclick="filterBy('all',this)">Todos</button>
    </div>
    <div class="flyers-grid" id="flyers-grid">
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p>Cargando diseños…</p>
      </div>
    </div>
  </div>
</div>


<!-- EDITOR -->
<div id="screen-editor" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">ua</div>
      <div class="topbar-title">Editor de Flyer</div>
    </div>
    <button class="btn-admin" onclick="openAdminModal()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Admin
    </button>
  </div>

  <div class="editor-layout">
    <div class="editor-canvas-area">
      <div class="canvas-wrap-view">
        <canvas id="view-canvas"></canvas>
      </div>
    </div>

    <div class="editor-side">
      <div class="editor-side-header">
        <button class="btn-back" onclick="goGallery()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
          Galería
        </button>
        <h2 id="view-design-name">—</h2>
      </div>

      <div class="editable-fields" id="editable-fields">
        <div class="no-editable">Cargando campos…</div>
      </div>

      <div class="editor-actions">
        <button class="btn-download" onclick="downloadPNG()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Descargar PNG
        </button>
        <button class="btn-reset" onclick="resetEdits()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Limpiar cambios
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ADMIN MODAL -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <div class="modal-logo">ua</div>
    <h3>Acceso de administrador</h3>
    <p>Ingresá el PIN para ir al panel de admin</p>
    <p class="modal-err" id="modal-err"></p>
    <input type="password" class="modal-input" id="modal-pin" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')checkModal()">
    <button class="btn-modal" onclick="checkModal()">Ingresar</button>
    <button class="btn-modal-ghost" onclick="closeAdminModal()">Cancelar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const FB={
  apiKey:"TU_API_KEY",authDomain:"TU_PROJECT.firebaseapp.com",
  projectId:"TU_PROJECT_ID",storageBucket:"TU_PROJECT.appspot.com",
  messagingSenderId:"TU_SENDER_ID",appId:"TU_APP_ID"
};
const ADMIN_PIN="4896";

firebase.initializeApp(FB);
const db=firebase.firestore();

// ── STATE ──
let allDesigns=[];
let currentDesign=null;  // full design object from Firestore
let userEdits={};        // { elementId: { ...overrides } }
let imgCache={};

const FORMATS={
  story:{w:1080,h:1920,scale:0.34},
  flyer:{w:1080,h:1350,scale:0.34}
};

const canvas=document.getElementById('view-canvas');
const ctx=canvas.getContext('2d');

// ── SCREENS ──
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goGallery(){ showScreen('screen-app'); }

// ── ADMIN MODAL ──
function openAdminModal(){ document.getElementById('modal-pin').value=''; document.getElementById('modal-err').textContent=''; document.getElementById('admin-modal').classList.add('active'); setTimeout(()=>document.getElementById('modal-pin').focus(),80); }
function closeAdminModal(){ document.getElementById('admin-modal').classList.remove('active'); }
function checkModal(){ if(document.getElementById('modal-pin').value===ADMIN_PIN){ window.location.href='admin.html'; } else { document.getElementById('modal-err').textContent='PIN incorrecto'; document.getElementById('modal-pin').value=''; } }
document.getElementById('admin-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeAdminModal(); });

// ── LOAD GALLERY ──
async function loadGallery(){
  const grid=document.getElementById('flyers-grid');
  try {
    const snap=await db.collection('ua_flyer_designs').where('active','==',true).orderBy('updatedAt','desc').get();
    allDesigns=snap.docs.map(d=>({id:d.id,...d.data()}));
    const cats=[...new Set(allDesigns.map(d=>d.category).filter(Boolean))];
    const bar=document.getElementById('filter-bar');
    cats.forEach(cat=>{
      const c=document.createElement('button');
      c.className='filter-chip'; c.dataset.cat=cat; c.textContent=cat;
      c.onclick=()=>filterBy(cat,c); bar.appendChild(c);
    });
    renderGrid(allDesigns);
  } catch(e){ console.error(e); grid.innerHTML='<div class="empty-state"><p>Error al cargar los diseños.</p></div>'; }
}

function renderGrid(designs){
  const grid=document.getElementById('flyers-grid');
  if(!designs.length){ grid.innerHTML='<div class="empty-state"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><p>No hay diseños en esta categoría</p></div>'; return; }
  grid.innerHTML=designs.map(d=>{
    const aspect=d.format==='flyer'?'4/5':'9/16';
    return `<div class="flyer-card" onclick="openDesign('${d.id}')">
      ${d.thumbnail
        ?`<img class="flyer-thumb" src="${d.thumbnail}" alt="${d.name}" style="aspect-ratio:${aspect}" loading="lazy">`
        :`<div class="flyer-thumb-ph" style="aspect-ratio:${aspect}"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sin preview</span></div>`}
      <div class="flyer-card-body">
        <div class="flyer-card-name">${d.name||'Sin nombre'}</div>
        ${d.category?`<span class="flyer-card-tag">${d.category}</span>`:''}
      </div>
      <div class="flyer-overlay"><button class="flyer-overlay-btn">Personalizar →</button></div>
    </div>`;
  }).join('');
}

function filterBy(cat,el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderGrid(cat==='all'?allDesigns:allDesigns.filter(d=>d.category===cat));
}

// ── OPEN DESIGN ──
function openDesign(id){
  currentDesign=allDesigns.find(d=>d.id===id);
  if(!currentDesign) return;
  userEdits={};
  document.getElementById('view-design-name').textContent=currentDesign.name||'—';
  showScreen('screen-editor');
  setupCanvas();
  buildFields();
  redraw();
}

function setupCanvas(){
  const f=FORMATS[currentDesign.format||'story'];
  canvas.width=f.w; canvas.height=f.h;
  canvas.style.width=f.w*f.scale+'px';
  canvas.style.height=f.h*f.scale+'px';
}

// ── BUILD EDITABLE FIELDS ──
function buildFields(){
  const container=document.getElementById('editable-fields');
  const els=currentDesign.elements||[];
  const editable=els.filter(el=>!el.locked&&el.visible!==false);

  if(!editable.length){
    container.innerHTML='<div class="no-editable">Este diseño no tiene campos editables. Descargalo tal como está.</div>';
    return;
  }

  let html='<div class="field-section"><div class="field-section-title">Campos editables</div>';
  editable.forEach(el=>{
    const label=el.label||el.type;
    if(el.type==='text'){
      const isShort=el.text&&el.text.length<60;
      html+=`<div class="field-item">
        <label class="field-label">${label}</label>
        ${isShort
          ?`<input type="text" class="field-input" data-id="${el.id}" placeholder="${el.text||''}" oninput="onEditText('${el.id}',this.value)">`
          :`<textarea class="field-textarea" data-id="${el.id}" placeholder="${el.text||''}" oninput="onEditText('${el.id}',this.value)"></textarea>`}
      </div>`;
    } else if(el.type==='image'){
      html+=`<div class="field-item">
        <label class="field-label">${label}</label>
        <div class="field-img-upload" onclick="triggerImgField('${el.id}')">
          <img id="imgprev_${el.id}" class="img-preview" src="" alt="">
          <div id="imgph_${el.id}">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p>Subir ${label}</p>
          </div>
          <input type="file" id="fileinput_${el.id}" accept="image/*" style="display:none" onchange="onImgField('${el.id}',event)">
        </div>
      </div>`;
    } else if(el.type==='rect'){
      html+=`<div class="field-item">
        <label class="field-label">${label} — color</label>
        <div class="field-color">
          <input type="color" value="${colorToHex(el.fill)||'#003366'}" oninput="onEditFill('${el.id}',this.value)">
          <span>Color de fondo</span>
        </div>
      </div>`;
    }
  });
  html+='</div>';
  container.innerHTML=html;
}

function colorToHex(c){
  if(!c) return '#003366';
  if(c.startsWith('#')) return c;
  const m=c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if(m) return '#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
  return '#003366';
}

// ── EDIT HANDLERS ──
function onEditText(id,val){ userEdits[id]={...(userEdits[id]||{}),text:val}; redraw(); }
function onEditFill(id,val){ userEdits[id]={...(userEdits[id]||{}),fill:val}; redraw(); }
function triggerImgField(id){ document.getElementById('fileinput_'+id).click(); }
function onImgField(id,e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    userEdits[id]={...(userEdits[id]||{}),src:ev.target.result};
    const prev=document.getElementById('imgprev_'+id);
    const ph=document.getElementById('imgph_'+id);
    if(prev){ prev.src=ev.target.result; prev.style.display='block'; }
    if(ph) ph.style.display='none';
    imgCache[ev.target.result]=null; // force reload
    redraw();
  };
  r.readAsDataURL(file);
}

function resetEdits(){ userEdits={}; buildFields(); redraw(); }

// ── DRAW ──
function getImg(src){
  if(imgCache[src]) return imgCache[src];
  const img=new Image();
  img.onload=()=>{ imgCache[src]=img; redraw(); };
  img.src=src; imgCache[src]=img; return null;
}

function redraw(){
  if(!currentDesign) return;
  const f=FORMATS[currentDesign.format||'story'];
  ctx.clearRect(0,0,f.w,f.h);

  // bg
  if(currentDesign.bgImageData){ const bi=getImg(currentDesign.bgImageData); if(bi) ctx.drawImage(bi,0,0,f.w,f.h); else { ctx.fillStyle=currentDesign.bgColor||'#002447'; ctx.fillRect(0,0,f.w,f.h); } }
  else { ctx.fillStyle=currentDesign.bgColor||'#002447'; ctx.fillRect(0,0,f.w,f.h); }

  const els=currentDesign.elements||[];
  els.forEach(el=>{
    if(!el.visible) return;
    const ov=userEdits[el.id]||{};
    const merged={...el,...ov};
    ctx.save();

    if(merged.type==='text'){
      ctx.font=`${merged.fontWeight||'700'} ${merged.fontSize||48}px '${merged.fontFamily||'Poppins'}',sans-serif`;
      ctx.fillStyle=merged.color||'#ffffff';
      ctx.textAlign=merged.align||'left';
      const ax=merged.align==='center'?merged.x+merged.w/2:merged.align==='right'?merged.x+merged.w:merged.x;
      wrapText(ctx,merged.text||'',ax,merged.y+merged.fontSize,merged.w,merged.fontSize*1.3);
    } else if(merged.type==='rect'){
      ctx.fillStyle=merged.fill||'transparent';
      if(merged.radius>0){ rr(ctx,merged.x,merged.y,merged.w,merged.h,merged.radius); ctx.fill(); }
      else ctx.fillRect(merged.x,merged.y,merged.w,merged.h);
      if(merged.stroke&&merged.stroke!=='none'&&merged.strokeWidth>0){
        ctx.strokeStyle=merged.stroke; ctx.lineWidth=merged.strokeWidth;
        if(merged.radius>0){ rr(ctx,merged.x,merged.y,merged.w,merged.h,merged.radius); ctx.stroke(); }
        else ctx.strokeRect(merged.x,merged.y,merged.w,merged.h);
      }
    } else if(merged.type==='line'){
      ctx.fillStyle=merged.fill||'#ffffff'; ctx.fillRect(merged.x,merged.y,merged.w,merged.h);
    } else if(merged.type==='image'){
      const src=merged.src||el.src;
      if(src){ const img=getImg(src); if(img) ctx.drawImage(img,merged.x,merged.y,merged.w,merged.h); }
    } else if(merged.type==='qr'){
      drawQRSimple(ctx,merged);
    }
    ctx.restore();
  });
}

function drawQRSimple(ctx,el){
  ctx.fillStyle='white'; ctx.fillRect(el.x,el.y,el.w,el.h);
  ctx.strokeStyle='#002447'; ctx.lineWidth=3; ctx.strokeRect(el.x,el.y,el.w,el.h);
  const cell=Math.floor(el.w/7);
  ctx.fillStyle='#002447';
  [[0,0],[4,0],[0,4],[5,5],[5,6],[6,5],[6,6],[2,2],[3,3],[4,4],[1,1],[4,1],[1,4]].forEach(([ci,ri])=>{
    ctx.fillRect(el.x+ci*cell+2,el.y+ri*cell+2,cell-1,cell-1);
  });
}

function wrapText(ctx,text,x,y,maxW,lineH){ const words=text.split(' ');let line='',cy=y;for(let i=0;i<words.length;i++){const t=line+words[i]+' ';if(ctx.measureText(t).width>maxW&&i>0){ctx.fillText(line.trim(),x,cy);line=words[i]+' ';cy+=lineH;}else line=t;}ctx.fillText(line.trim(),x,cy); }
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── DOWNLOAD ──
function downloadPNG(){
  redraw();
  const link=document.createElement('a');
  const name=(currentDesign?.name||'flyer').replace(/\s+/g,'_');
  link.download=`UA_${name}_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
  if(currentDesign?.id){
    db.collection('download_logs').add({ designId:currentDesign.id, designName:currentDesign.name, timestamp:firebase.firestore.FieldValue.serverTimestamp() }).catch(()=>{});
  }
}

loadGallery();
