<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — UA Flyers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --azul:#00528F; --teal:#008091; --oscuro:#002447;
  --cyan:#00C4DF; --fucsia:#ff436e;
  --bg:#f0f4f8; --white:#fff;
  --gl:#e8edf3; --gm:#b0bec8; --gd:#4a5568; --text:#1a2332;
  --r:12px; --rs:8px;
  --sh:0 4px 20px rgba(0,36,71,.10); --shl:0 8px 40px rgba(0,36,71,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── PIN GATE ── */
#pin-gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--oscuro),var(--azul) 60%,var(--teal));display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;}
.pin-card{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:360px;box-shadow:var(--shl);text-align:center;}
.pin-logo{width:54px;height:54px;background:linear-gradient(135deg,var(--azul),var(--teal));border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:800;margin:0 auto 22px;}
.pin-card h2{font-size:19px;font-weight:700;color:var(--oscuro);margin-bottom:6px;}
.pin-card p{font-size:12px;color:var(--gd);margin-bottom:24px;}
.pin-err{font-size:12px;color:var(--fucsia);min-height:18px;margin-bottom:10px;}
.pin-input{width:100%;padding:14px;border:1.5px solid var(--gl);border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;text-align:center;letter-spacing:10px;color:var(--oscuro);outline:none;margin-bottom:14px;transition:border-color .2s;}
.pin-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,82,143,.1);}
.btn-pin{width:100%;padding:13px;background:linear-gradient(135deg,var(--azul),var(--teal));color:white;border:none;border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-pin:hover{opacity:.9;}

/* ── TOPBAR ── */
.topbar{background:var(--oscuro);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--azul),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:800;}
.topbar-title{font-size:13px;font-weight:700;color:white;}
.badge-admin{background:rgba(255,67,110,.2);color:#ff8fa8;font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;letter-spacing:.5px;}
.topbar-center{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.tb-btn{background:rgba(255,255,255,.1);border:none;color:white;border-radius:7px;padding:6px 12px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.2);}
.tb-btn.active{background:var(--azul);}
.tb-btn.green{background:rgba(0,196,90,.25);color:#7fffd4;}
.tb-btn.green:hover{background:rgba(0,196,90,.4);}
.tb-btn.red{background:rgba(255,67,110,.2);color:#ff8fa8;}
.tb-btn.red:hover{background:rgba(255,67,110,.35);}
#design-name-input{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:7px;color:white;font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;padding:5px 12px;outline:none;width:200px;}
#design-name-input:focus{border-color:var(--cyan);background:rgba(255,255,255,.18);}
#design-name-input::placeholder{color:rgba(255,255,255,.45);}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── LEFT TOOLBAR ── */
.toolbar{width:52px;background:var(--white);border-right:1px solid var(--gl);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;flex-shrink:0;}
.tool-btn{width:38px;height:38px;border:none;background:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gd);transition:all .15s;position:relative;}
.tool-btn:hover{background:var(--gl);color:var(--azul);}
.tool-btn.active{background:rgba(0,82,143,.1);color:var(--azul);}
.tool-sep{width:28px;height:1px;background:var(--gl);margin:4px 0;}

/* ── CANVAS AREA ── */
.canvas-area{flex:1;background:#2a2a3a;display:flex;align-items:center;justify-content:center;overflow:auto;position:relative;}
.canvas-wrap{position:relative;box-shadow:0 10px 60px rgba(0,0,0,.5);}
#main-canvas{display:block;cursor:default;}

/* ── FORMAT INDICATOR ── */
.format-pill{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:white;font-size:10px;font-weight:600;padding:4px 12px;border-radius:10px;pointer-events:none;}

/* ── RIGHT PANEL ── */
.right-panel{width:260px;background:var(--white);border-left:1px solid var(--gl);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.panel-tabs{display:flex;border-bottom:1px solid var(--gl);}
.panel-tab{flex:1;padding:10px 4px;border:none;background:none;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500;color:var(--gd);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.panel-tab.active{color:var(--azul);border-bottom-color:var(--azul);font-weight:600;}
.panel-body{flex:1;overflow-y:auto;padding:14px;}
.panel-section{margin-bottom:18px;}
.panel-section-title{font-size:9px;font-weight:700;color:var(--gm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}

/* ── LAYERS ── */
.layer-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .1s;border:1.5px solid transparent;}
.layer-item:hover{background:var(--bg);}
.layer-item.selected{background:rgba(0,82,143,.07);border-color:rgba(0,82,143,.2);}
.layer-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.layer-name{flex:1;font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.layer-lock{background:none;border:none;cursor:pointer;color:var(--gm);padding:2px;border-radius:4px;display:flex;transition:color .15s;}
.layer-lock:hover{color:var(--fucsia);}
.layer-lock.locked{color:var(--fucsia);}
.layer-vis{background:none;border:none;cursor:pointer;color:var(--gm);padding:2px;border-radius:4px;display:flex;transition:color .15s;}
.layer-vis.hidden-layer{color:var(--gl);}
.layer-del{background:none;border:none;cursor:pointer;color:var(--gl);padding:2px;border-radius:4px;display:flex;transition:color .15s;}
.layer-del:hover{color:var(--fucsia);}

/* ── PROPS PANEL ── */
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.prop-label{font-size:10px;font-weight:600;color:var(--gd);min-width:52px;flex-shrink:0;}
.prop-input{flex:1;padding:5px 8px;border:1.5px solid var(--gl);border-radius:6px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;}
.prop-input:focus{border-color:var(--azul);}
.prop-input[type=color]{padding:1px 3px;height:28px;cursor:pointer;}
.prop-input[type=range]{padding:0;height:4px;accent-color:var(--azul);}
.prop-textarea{width:100%;padding:6px 8px;border:1.5px solid var(--gl);border-radius:6px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;resize:vertical;min-height:60px;transition:border-color .2s;}
.prop-textarea:focus{border-color:var(--azul);}
.prop-select{flex:1;padding:5px 8px;border:1.5px solid var(--gl);border-radius:6px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);outline:none;background:white;}
.prop-2col{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.prop-2col .prop-input{width:100%;}

.lock-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--gl);cursor:pointer;transition:all .2s;margin-bottom:10px;}
.lock-toggle.locked{border-color:var(--fucsia);background:rgba(255,67,110,.05);}
.lock-toggle span{font-size:11px;font-weight:600;flex:1;}
.lock-toggle.locked span{color:var(--fucsia);}

/* ── DESIGNS LIST ── */
.design-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--rs);border:1.5px solid var(--gl);margin-bottom:8px;cursor:pointer;transition:all .15s;}
.design-item:hover{border-color:var(--azul);background:rgba(0,82,143,.03);}
.design-thumb{width:36px;height:54px;border-radius:5px;background:var(--gl);object-fit:cover;flex-shrink:0;}
.design-thumb-ph{width:36px;height:54px;border-radius:5px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gm);flex-shrink:0;}
.design-info{flex:1;min-width:0;}
.design-info-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.design-info-cat{font-size:10px;color:var(--gm);}
.design-actions{display:flex;gap:4px;}
.design-act-btn{background:none;border:1px solid var(--gl);border-radius:5px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gd);transition:all .15s;}
.design-act-btn:hover{border-color:var(--azul);color:var(--azul);}
.design-act-btn.del:hover{border-color:var(--fucsia);color:var(--fucsia);}

/* ── TOGGLE (active state) ── */
.active-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:1.5px solid var(--gl);margin-bottom:8px;}
.active-toggle span{font-size:11px;font-weight:500;color:var(--text);}
.sw{position:relative;width:32px;height:18px;display:inline-block;}
.sw input{opacity:0;width:0;height:0;}
.sw-track{position:absolute;inset:0;background:var(--gl);border-radius:9px;cursor:pointer;transition:background .2s;}
.sw-track::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked+.sw-track{background:var(--teal);}
input:checked+.sw-track::after{transform:translateX(14px);}

/* ── MISC ── */
.btn-block{width:100%;padding:9px;border:none;border-radius:var(--rs);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-bottom:6px;}
.btn-primary-sm{background:linear-gradient(135deg,var(--azul),var(--teal));color:white;}
.btn-primary-sm:hover{opacity:.9;}
.btn-secondary-sm{background:var(--gl);color:var(--gd);}
.btn-secondary-sm:hover{background:#d8e2ec;}
.btn-danger-sm{background:rgba(255,67,110,.1);color:var(--fucsia);border:1px solid rgba(255,67,110,.2);}
.btn-danger-sm:hover{background:rgba(255,67,110,.18);}

.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--oscuro);color:white;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:500;z-index:9998;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

.sep{height:1px;background:var(--gl);margin:8px 0;}

/* format selector */
.fmt-btns{display:flex;gap:6px;margin-bottom:10px;}
.fmt-btn{flex:1;padding:7px;border:1.5px solid var(--gl);border-radius:7px;background:white;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--gd);cursor:pointer;text-align:center;transition:all .15s;}
.fmt-btn.active{border-color:var(--azul);background:rgba(0,82,143,.07);color:var(--azul);}

.empty-layers{text-align:center;padding:24px 12px;color:var(--gm);font-size:11px;}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gl);border-radius:2px;}
</style>
</head>
<body>

<!-- PIN GATE -->
<div id="pin-gate">
  <div class="pin-card">
    <div class="pin-logo">ua</div>
    <h2>Panel de administración</h2>
    <p>Ingresá el PIN para continuar</p>
    <p class="pin-err" id="pin-err"></p>
    <input type="password" class="pin-input" id="pin-input" maxlength="4" placeholder="••••" autofocus onkeydown="if(event.key==='Enter')checkPin()">
    <button class="btn-pin" onclick="checkPin()">Ingresar</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">ua</div>
    <div class="topbar-title">UA Flyers</div>
    <span class="badge-admin">ADMIN</span>
  </div>
  <div class="topbar-center">
    <input type="text" id="design-name-input" placeholder="Nombre del diseño…" value="Nuevo diseño">
    <select id="design-category" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:7px;color:white;font-family:'Poppins',sans-serif;font-size:11px;padding:5px 10px;outline:none;">
      <option value="General">General</option>
      <option value="Europa">Europa</option>
      <option value="América">América</option>
      <option value="Mundo">Mundo</option>
      <option value="Corporativo">Corporativo</option>
    </select>
  </div>
  <div class="topbar-right">
    <button class="tb-btn" onclick="undo()" title="Deshacer (Ctrl+Z)">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M3 13A9 9 0 1 0 5.7 6.7L3 7"/></svg> Deshacer
    </button>
    <button class="tb-btn" onclick="redo()" title="Rehacer (Ctrl+Y)">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M21 13A9 9 0 1 1 18.3 6.7L21 7"/></svg> Rehacer
    </button>
    <div style="width:1px;height:20px;background:rgba(255,255,255,.15);margin:0 4px;"></div>
    <button class="tb-btn green" onclick="saveDesign()" id="btn-save">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar
    </button>
    <button class="tb-btn" onclick="newDesign()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nuevo
    </button>
    <button class="tb-btn red" onclick="lockAdmin()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT TOOLBAR -->
  <div class="toolbar">
    <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Seleccionar (V)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="tool-text" onclick="addText()" title="Texto (T)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="tool-btn" id="tool-rect" onclick="addShape('rect')" title="Rectángulo (R)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
    </button>
    <button class="tool-btn" id="tool-line" onclick="addShape('line')" title="Línea (L)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="triggerImageUpload()" title="Subir imagen">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <button class="tool-btn" onclick="addQR()" title="Código QR">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="19" y1="14" x2="19" y2="17"/><line x1="17" y1="19" x2="21" y2="19"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="setBg()" title="Fondo / imagen de fondo">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><circle cx="8" cy="9" r="2"/><path d="M2 17l6-4 4 3 4-4 6 5"/></svg>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" onclick="deleteSelected()" title="Eliminar seleccionado (Del)">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
    </button>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div class="format-pill" id="format-pill">Story 1080×1920</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-tabs">
      <button class="panel-tab active" onclick="switchPanel('props',this)">Propiedades</button>
      <button class="panel-tab" onclick="switchPanel('layers',this)">Capas</button>
      <button class="panel-tab" onclick="switchPanel('designs',this)">Diseños</button>
    </div>

    <!-- PROPS -->
    <div class="panel-body" id="panel-props">
      <div class="panel-section">
        <div class="panel-section-title">Formato del canvas</div>
        <div class="fmt-btns">
          <button class="fmt-btn active" id="fmt-story" onclick="setFormat('story',this)">Story<br><span style="font-weight:400;font-size:9px">1080×1920</span></button>
          <button class="fmt-btn" id="fmt-flyer" onclick="setFormat('flyer',this)">Flyer<br><span style="font-weight:400;font-size:9px">1080×1350</span></button>
        </div>
      </div>
      <div class="panel-section">
        <div class="panel-section-title">Fondo del canvas</div>
        <div class="prop-row">
          <span class="prop-label">Color</span>
          <input type="color" class="prop-input" id="bg-color" value="#002447" oninput="setBgColor(this.value)">
        </div>
        <button class="btn-block btn-secondary-sm" onclick="setBg()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 17l6-4 4 3 4-4 6 5"/></svg>
          Subir imagen de fondo
        </button>
      </div>
      <div class="sep"></div>
      <div id="element-props">
        <p style="font-size:11px;color:var(--gm);text-align:center;padding:20px 0;">Seleccioná un elemento para editar sus propiedades</p>
      </div>
    </div>

    <!-- LAYERS -->
    <div class="panel-body" id="panel-layers" style="display:none">
      <div id="layers-list">
        <div class="empty-layers">Sin elementos aún.<br>Agregá texto, imágenes o formas.</div>
      </div>
    </div>

    <!-- DESIGNS -->
    <div class="panel-body" id="panel-designs" style="display:none">
      <button class="btn-block btn-primary-sm" onclick="saveDesign()" style="margin-bottom:14px">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
        Guardar diseño actual
      </button>

<script>

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const FORMATS = {
  story:{ w:1080, h:1920, label:'Story 1080×1920', scale:0.35 },
  flyer:{ w:1080, h:1350, label:'Flyer 1080×1350', scale:0.35 }
};

let state = {
  format:'story',
  bgColor:'#002447',
  bgImageData: null,   // data URL
  elements:[],
  currentId: null,
  editingDesignId: null
};

let undoStack=[], redoStack=[];
let dragging=false, resizing=false;
let dragOffX=0, dragOffY=0;
let resizeHandle='';

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init(){
  setFormat('story', document.getElementById('fmt-story'));
  loadDesigns();
  bindKeys();
}

// ═══════════════════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════════════════
function setFormat(fmt, el){
  state.format = fmt;
  const f = FORMATS[fmt];
  canvas.width  = f.w;
  canvas.height = f.h;
  canvas.style.width  = f.w * f.scale + 'px';
  canvas.style.height = f.h * f.scale + 'px';
  document.getElementById('format-pill').textContent = f.label;
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

}

// ═══════════════════════════════════════════════════════
//  ELEMENT FACTORY
// ═══════════════════════════════════════════════════════
let idCounter = 1;
function makeId(){ return 'el_'+(idCounter++); }

function makeText(){
  return { id:makeId(), type:'text', x:200, y:300, w:600, h:80,
    text:'Texto de ejemplo', fontFamily:'Poppins', fontSize:48, fontWeight:'700',
    color:'#ffffff', align:'left', locked:false, visible:true,
    label:'Texto' };
}
function makeRect(){
  return { id:makeId(), type:'rect', x:200, y:400, w:680, h:200,
    fill:'rgba(0,82,143,0.7)', stroke:'none', strokeWidth:0,
    radius:20, locked:false, visible:true, label:'Rectángulo' };
}
function makeLine(){
  return { id:makeId(), type:'line', x:100, y:600, w:880, h:4,
    fill:'#00C4DF', locked:false, visible:true, label:'Línea' };
}
function makeImage(dataUrl, w, h){
  return { id:makeId(), type:'image', x:300, y:400, w:w, h:h,
    src:dataUrl, locked:false, visible:true, label:'Imagen' };
}
function makeQR(url){
  return { id:makeId(), type:'qr', x:800, y:100, w:200, h:200,
    url: url||'https://universal-assistance.com',
    locked:false, visible:true, label:'QR' };
}

// ═══════════════════════════════════════════════════════
//  ADD ELEMENTS
// ═══════════════════════════════════════════════════════
function addText(){ saveUndo(); state.elements.push(makeText()); selectEl(state.elements[state.elements.length-1].id); redraw(); updateLayers(); }
function addShape(t){ saveUndo(); state.elements.push(t==='rect'?makeRect():makeLine()); selectEl(state.elements[state.elements.length-1].id); redraw(); updateLayers(); }
function addQR(){
  const url = prompt('URL para el QR:', 'https://universal-assistance.com');
  if(!url) return;
  saveUndo();
  state.elements.push(makeQR(url));
  selectEl(state.elements[state.elements.length-1].id);
  redraw(); updateLayers();
}
function triggerImageUpload(){ document.getElementById('img-upload').click(); }
function setBg(){ document.getElementById('bg-upload').click(); }

function handleImageUpload(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      saveUndo();
      // scale to fit reasonably on canvas
      const ratio = Math.min(600/img.width, 400/img.height);
      const w = Math.round(img.width*ratio), h = Math.round(img.height*ratio);
      state.elements.push(makeImage(ev.target.result, w, h));
      selectEl(state.elements[state.elements.length-1].id);
      redraw(); updateLayers();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
  e.target.value='';
}

function handleBgUpload(e){
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => { saveUndo(); state.bgImageData = ev.target.result; redraw(); };
  r.readAsDataURL(file);
  e.target.value='';
}

function setBgColor(c){ saveUndo(); state.bgColor=c; redraw(); }

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
const imgCache = {};
function getImg(src){
  if(imgCache[src]) return imgCache[src];
  const img = new Image();
  img.onload = () => { imgCache[src]=img; redraw(); };
  img.src = src;
  imgCache[src] = img;
  return null;
}

// QR generation — simple module pattern
function drawQR(ctx, el){
  // Basic visual placeholder — uses data URL from qrcode lib if available
  const { x,y,w,h } = el;
  ctx.fillStyle='white';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='#002447'; ctx.lineWidth=4;
  ctx.strokeRect(x,y,w,h);
  // draw a simple QR-like pattern as placeholder
  const cell = Math.floor(w/7);
  const positions = [[0,0],[4,0],[0,4],[5,5],[5,6],[6,5],[6,6],[1,1],[4,1],[1,4],[2,2],[3,3],[4,4],[2,4],[4,2]];
  ctx.fillStyle='#002447';
  positions.forEach(([ci,ri])=>{
    ctx.fillRect(x+ci*cell+2, y+ri*cell+2, cell-1, cell-1);
  });
  // finder squares
  [[0,0],[4,0],[0,4]].forEach(([ci,ri])=>{
    ctx.strokeStyle='#002447'; ctx.lineWidth=2;
    ctx.strokeRect(x+ci*cell, y+ri*cell, cell*3, cell*3);
    ctx.fillStyle='#002447';
    ctx.fillRect(x+ci*cell+cell, y+ri*cell+cell, cell, cell);
  });
  // url label
  ctx.fillStyle='#444'; ctx.font='bold 18px Poppins,sans-serif'; ctx.textAlign='center';
  ctx.fillText(el.url.replace('https://',''), x+w/2, y+h+24);
}

function redraw(){
  const f = FORMATS[state.format];
  ctx.clearRect(0,0,f.w,f.h);

  // background
  if(state.bgImageData){
    const bi = getImg(state.bgImageData);
    if(bi) ctx.drawImage(bi,0,0,f.w,f.h);
    else { ctx.fillStyle=state.bgColor; ctx.fillRect(0,0,f.w,f.h); }
  } else {
    ctx.fillStyle=state.bgColor; ctx.fillRect(0,0,f.w,f.h);
  }

  // elements
  state.elements.forEach(el => {
    if(!el.visible) return;
    ctx.save();
    if(el.type==='text'){
      ctx.font = `${el.fontWeight} ${el.fontSize}px '${el.fontFamily}',sans-serif`;
      ctx.fillStyle = el.color;
      ctx.textAlign = el.align||'left';
      const ax = el.align==='center' ? el.x+el.w/2 : el.align==='right' ? el.x+el.w : el.x;
      // word wrap
      wrapText(ctx, el.text, ax, el.y+el.fontSize, el.w, el.fontSize*1.3);
    } else if(el.type==='rect'){
      ctx.fillStyle=el.fill||'transparent';
      if(el.radius>0){
        rr(ctx,el.x,el.y,el.w,el.h,el.radius); ctx.fill();
      } else { ctx.fillRect(el.x,el.y,el.w,el.h); }
      if(el.stroke&&el.stroke!=='none'&&el.strokeWidth>0){
        ctx.strokeStyle=el.stroke; ctx.lineWidth=el.strokeWidth;
        if(el.radius>0){ rr(ctx,el.x,el.y,el.w,el.h,el.radius); ctx.stroke(); }
        else ctx.strokeRect(el.x,el.y,el.w,el.h);
      }
    } else if(el.type==='line'){
      ctx.fillStyle=el.fill||'#ffffff';
      ctx.fillRect(el.x,el.y,el.w,el.h);
    } else if(el.type==='image'){
      const img = getImg(el.src);
      if(img) ctx.drawImage(img,el.x,el.y,el.w,el.h);
    } else if(el.type==='qr'){
      drawQR(ctx,el);
    }
    ctx.restore();

    // selection handles
    if(el.id===state.currentId){
      const sel = '#00C4DF';
      ctx.strokeStyle=sel; ctx.lineWidth=2;
      ctx.setLineDash([8,4]);
      ctx.strokeRect(el.x-2,el.y-2,el.w+4,el.h+4);
      ctx.setLineDash([]);
      // handles
      const hs=10;
      [
        [el.x-hs/2, el.y-hs/2], [el.x+el.w/2-hs/2, el.y-hs/2], [el.x+el.w-hs/2, el.y-hs/2],
        [el.x-hs/2, el.y+el.h/2-hs/2], [el.x+el.w-hs/2, el.y+el.h/2-hs/2],
        [el.x-hs/2, el.y+el.h-hs/2], [el.x+el.w/2-hs/2, el.y+el.h-hs/2], [el.x+el.w-hs/2, el.y+el.h-hs/2]
      ].forEach(([hx,hy])=>{
        ctx.fillStyle=sel; ctx.fillRect(hx,hy,hs,hs);
        ctx.strokeStyle='white'; ctx.lineWidth=1.5; ctx.strokeRect(hx,hy,hs,hs);
      });
      // lock indicator
      if(el.locked){
        ctx.fillStyle='rgba(255,67,110,.85)';
        ctx.font='bold 28px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🔒', el.x+el.w-20, el.y+28);
      }
    }
  });
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(' '); let line='', cy=y;
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){ ctx.fillText(line.trim(),x,cy); line=words[i]+' '; cy+=lineH; }
    else line=test;
  }
  ctx.fillText(line.trim(),x,cy);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ═══════════════════════════════════════════════════════
//  SELECT & DRAG
// ═══════════════════════════════════════════════════════
function getScale(){ return FORMATS[state.format].scale; }

function canvasCoords(e){
  const rect = canvas.getBoundingClientRect();
  const s = getScale();
  return { x:(e.clientX-rect.left)/s, y:(e.clientY-rect.top)/s };
}

function hitEl(x,y){
  for(let i=state.elements.length-1;i>=0;i--){
    const el=state.elements[i];
    if(!el.visible) continue;
    if(x>=el.x&&x<=el.x+el.w&&y>=el.y&&y<=el.y+el.h) return el;
  }
  return null;
}

const HANDLE_SIZE=10;
function hitHandle(el,x,y){
  if(!el) return '';
  const hs=HANDLE_SIZE, pts={
    'nw':[el.x,el.y], 'n':[el.x+el.w/2,el.y], 'ne':[el.x+el.w,el.y],
    'w':[el.x,el.y+el.h/2], 'e':[el.x+el.w,el.y+el.h/2],
    'sw':[el.x,el.y+el.h], 's':[el.x+el.w/2,el.y+el.h], 'se':[el.x+el.w,el.y+el.h]
  };
  for(const [h,[hx,hy]] of Object.entries(pts)){
    if(x>=hx-hs/2&&x<=hx+hs/2&&y>=hy-hs/2&&y<=hy+hs/2) return h;
  }
  return '';
}

canvas.addEventListener('mousedown',e=>{
  const {x,y}=canvasCoords(e);
  const sel = state.elements.find(el=>el.id===state.currentId)||null;
  const handle = sel ? hitHandle(sel,x,y) : '';
  if(handle){
    resizing=true; resizeHandle=handle;
    canvas.style.cursor='se-resize';
    saveUndo();
    return;
  }
  const hit=hitEl(x,y);
  if(hit){
    if(hit.id!==state.currentId){ selectEl(hit.id); }
    if(!hit.locked){ dragging=true; dragOffX=x-hit.x; dragOffY=y-hit.y; saveUndo(); }
  } else {
    selectEl(null); redraw();
  }
});

canvas.addEventListener('mousemove',e=>{
  const {x,y}=canvasCoords(e);
  if(dragging){
    const el=state.elements.find(el=>el.id===state.currentId);
    if(el&&!el.locked){ el.x=Math.round(x-dragOffX); el.y=Math.round(y-dragOffY); redraw(); }
  } else if(resizing){
    const el=state.elements.find(el=>el.id===state.currentId);
    if(el&&!el.locked){
      const r=resizeHandle;
      if(r.includes('e')) el.w=Math.max(20,Math.round(x-el.x));
      if(r.includes('s')) el.h=Math.max(10,Math.round(y-el.y));
      if(r.includes('w')){ const rEdge=el.x+el.w; el.x=Math.round(x); el.w=Math.max(20,rEdge-el.x); }
      if(r.includes('n')){ const bEdge=el.y+el.h; el.y=Math.round(y); el.h=Math.max(10,bEdge-el.y); }
      redraw();
    }
  } else {
    const sel=state.elements.find(el=>el.id===state.currentId);
    const handle=sel?hitHandle(sel,x,y):'';
    if(handle) canvas.style.cursor='se-resize';
    else {
      const hit=hitEl(x,y);
      canvas.style.cursor=hit?(hit.locked?'not-allowed':'move'):'default';
    }
  }
});

canvas.addEventListener('mouseup',()=>{ dragging=false; resizing=false; updateLayers(); });
canvas.addEventListener('dblclick',e=>{
  const {x,y}=canvasCoords(e);
  const hit=hitEl(x,y);
  if(hit&&hit.type==='text'&&!hit.locked){
    const nv=prompt('Editar texto:',hit.text);
    if(nv!==null){ saveUndo(); hit.text=nv; redraw(); updateProps(); }
  }
});

function selectEl(id){
  state.currentId=id;
  updateProps();
  updateLayers();
  redraw();
}

function deleteSelected(){
  if(!state.currentId) return;
  const el=state.elements.find(el=>el.id===state.currentId);
  if(el&&el.locked){ showToast('Elemento bloqueado'); return; }
  saveUndo();
  state.elements=state.elements.filter(el=>el.id!==state.currentId);
  state.currentId=null;
  redraw(); updateProps(); updateLayers();
}

// ═══════════════════════════════════════════════════════
//  UNDO / REDO
// ═══════════════════════════════════════════════════════
function saveUndo(){
  undoStack.push(JSON.stringify({elements:state.elements,bgColor:state.bgColor,bgImageData:state.bgImageData}));
  if(undoStack.length>50) undoStack.shift();
  redoStack=[];
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(JSON.stringify({elements:state.elements,bgColor:state.bgColor,bgImageData:state.bgImageData}));
  const prev=JSON.parse(undoStack.pop());
  state.elements=prev.elements; state.bgColor=prev.bgColor; state.bgImageData=prev.bgImageData;
  state.currentId=null; redraw(); updateProps(); updateLayers();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(JSON.stringify({elements:state.elements,bgColor:state.bgColor,bgImageData:state.bgImageData}));
  const next=JSON.parse(redoStack.pop());
  state.elements=next.elements; state.bgColor=next.bgColor; state.bgImageData=next.bgImageData;
  state.currentId=null; redraw(); updateProps(); updateLayers();
}

// ═══════════════════════════════════════════════════════
//  LAYERS PANEL
// ═══════════════════════════════════════════════════════
const LAYER_ICONS={text:'#00C4DF',rect:'#00528F',line:'#008091',image:'#ff436e',qr:'#002447'};
const LAYER_LABELS={text:'T',rect:'▭',line:'—',image:'⬜',qr:'QR'};

function updateLayers(){
  const el=document.getElementById('layers-list');
  if(!state.elements.length){ el.innerHTML='<div class="empty-layers">Sin elementos aún.</div>'; return; }
  el.innerHTML=[...state.elements].reverse().map(item=>`
    <div class="layer-item ${item.id===state.currentId?'selected':''}" onclick="selectEl('${item.id}')">
      <div class="layer-icon" style="background:${LAYER_ICONS[item.type]||'#888'};color:white">${LAYER_LABELS[item.type]||'?'}</div>
      <span class="layer-name">${item.label||item.type}</span>
      <button class="layer-vis ${item.visible?'':'hidden-layer'}" onclick="event.stopPropagation();toggleVisible('${item.id}')" title="${item.visible?'Ocultar':'Mostrar'}">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>${!item.visible?'<line x1="2" y1="2" x2="22" y2="22"/>':''}</svg>
      </button>
      <button class="layer-lock ${item.locked?'locked':''}" onclick="event.stopPropagation();toggleLock('${item.id}')" title="${item.locked?'Desbloquear':'Bloquear para comerciales'}">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="${item.locked?'M7 11V7a5 5 0 0 1 10 0v4':'M7 11V7a5 5 0 0 1 9.9-1'}"/></svg>
      </button>
      <button class="layer-del" onclick="event.stopPropagation();deleteEl('${item.id}')" title="Eliminar">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function toggleLock(id){
  const el=state.elements.find(e=>e.id===id);
  if(el){ el.locked=!el.locked; redraw(); updateLayers(); updateProps(); }
}
function toggleVisible(id){
  const el=state.elements.find(e=>e.id===id);
  if(el){ el.visible=!el.visible; redraw(); updateLayers(); }
}
function deleteEl(id){
  const el=state.elements.find(e=>e.id===id);
  if(el&&el.locked){ showToast('Desbloqueá el elemento primero'); return; }
  saveUndo();
  state.elements=state.elements.filter(e=>e.id!==id);
  if(state.currentId===id) state.currentId=null;
  redraw(); updateProps(); updateLayers();
}

// ═══════════════════════════════════════════════════════
//  PROPS PANEL
// ═══════════════════════════════════════════════════════
function updateProps(){
  const el=state.elements.find(e=>e.id===state.currentId);
  const container=document.getElementById('element-props');
  if(!el){ container.innerHTML='<p style="font-size:11px;color:var(--gm);text-align:center;padding:20px 0;">Seleccioná un elemento para editar sus propiedades</p>'; return; }

  const lockHtml=`
    <div class="lock-toggle ${el.locked?'locked':''}" onclick="toggleLock('${el.id}')" id="lock-toggle">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="${el.locked?'M7 11V7a5 5 0 0 1 10 0v4':'M7 11V7a5 5 0 0 1 9.9-1'}"/></svg>
      <span>${el.locked?'🔒 Bloqueado para comerciales':'🔓 Editable por comerciales'}</span>
    </div>`;

  const labelHtml=`
    <div class="prop-row">
      <span class="prop-label">Etiqueta</span>
      <input type="text" class="prop-input" value="${el.label||''}" oninput="updateProp('label',this.value)" placeholder="Nombre del campo">
    </div>`;

  let specific='';
  if(el.type==='text'){
    specific=`
      <div class="panel-section-title">Texto</div>
      <div class="prop-row"><span class="prop-label">Contenido</span></div>
      <textarea class="prop-textarea" oninput="updateProp('text',this.value)">${el.text}</textarea>
      <div class="prop-row" style="margin-top:8px">
        <span class="prop-label">Tamaño</span>
        <input type="range" class="prop-input" min="12" max="200" value="${el.fontSize}" oninput="updatePropNum('fontSize',this.value)">
        <span style="font-size:11px;color:var(--gd);min-width:30px">${el.fontSize}px</span>
      </div>
      <div class="prop-row">
        <span class="prop-label">Peso</span>
        <select class="prop-select" onchange="updateProp('fontWeight',this.value)">
          <option value="400" ${el.fontWeight==='400'?'selected':''}>Regular</option>
          <option value="600" ${el.fontWeight==='600'?'selected':''}>SemiBold</option>
          <option value="700" ${el.fontWeight==='700'?'selected':''}>Bold</option>
          <option value="800" ${el.fontWeight==='800'?'selected':''}>ExtraBold</option>
        </select>
      </div>
      <div class="prop-row">
        <span class="prop-label">Color</span>
        <input type="color" class="prop-input" value="${el.color}" oninput="updateProp('color',this.value)">
      </div>
      <div class="prop-row">
        <span class="prop-label">Alinear</span>
        <select class="prop-select" onchange="updateProp('align',this.value)">
          <option value="left" ${el.align==='left'?'selected':''}>Izquierda</option>
          <option value="center" ${el.align==='center'?'selected':''}>Centro</option>
          <option value="right" ${el.align==='right'?'selected':''}>Derecha</option>
        </select>
      </div>`;
  } else if(el.type==='rect'){
    specific=`
      <div class="panel-section-title">Rectángulo</div>
      <div class="prop-row">
        <span class="prop-label">Relleno</span>
        <input type="color" class="prop-input" value="${el.fill&&el.fill.startsWith('#')?el.fill:'#003366'}" oninput="updateProp('fill',this.value)">
        <input type="range" class="prop-input" min="0" max="100" value="${Math.round(parseOpacity(el.fill)*100)}" oninput="updateFillOpacity(this.value)">
        <span style="font-size:10px;color:var(--gd);min-width:28px" id="opval">${Math.round(parseOpacity(el.fill)*100)}%</span>
      </div>
      <div class="prop-row">
        <span class="prop-label">Borde</span>
        <input type="color" class="prop-input" value="${el.stroke&&el.stroke!=='none'?el.stroke:'#ffffff'}" oninput="updateProp('stroke',this.value)">
        <input type="number" class="prop-input" value="${el.strokeWidth||0}" min="0" max="20" style="width:48px" oninput="updatePropNum('strokeWidth',this.value)">
      </div>
      <div class="prop-row">
        <span class="prop-label">Radio</span>
        <input type="range" class="prop-input" min="0" max="100" value="${el.radius||0}" oninput="updatePropNum('radius',this.value)">
        <span style="font-size:11px;color:var(--gd);min-width:28px">${el.radius||0}px</span>
      </div>`;
  } else if(el.type==='line'){
    specific=`
      <div class="panel-section-title">Línea</div>
      <div class="prop-row">
        <span class="prop-label">Color</span>
        <input type="color" class="prop-input" value="${el.fill||'#ffffff'}" oninput="updateProp('fill',this.value)">
      </div>
      <div class="prop-row">
        <span class="prop-label">Grosor</span>
        <input type="range" class="prop-input" min="1" max="40" value="${el.h||4}" oninput="updatePropNum('h',this.value)">
        <span style="font-size:11px;color:var(--gd);min-width:28px">${el.h||4}px</span>
      </div>`;
  } else if(el.type==='qr'){
    specific=`
      <div class="panel-section-title">Código QR</div>
      <div class="prop-row">
        <span class="prop-label">URL</span>
        <input type="text" class="prop-input" value="${el.url}" oninput="updateProp('url',this.value)">
      </div>`;
  } else if(el.type==='image'){
    specific=`<div class="panel-section-title">Imagen</div>
      <button class="btn-block btn-secondary-sm" onclick="triggerImageUpload()">Reemplazar imagen</button>`;
  }

  const posHtml=`
    <div class="sep"></div>
    <div class="panel-section-title">Posición y tamaño</div>
    <div class="prop-2col">
      <input type="number" class="prop-input" placeholder="X" value="${Math.round(el.x)}" oninput="updatePropNum('x',this.value)">
      <input type="number" class="prop-input" placeholder="Y" value="${Math.round(el.y)}" oninput="updatePropNum('y',this.value)">
      <input type="number" class="prop-input" placeholder="W" value="${Math.round(el.w)}" oninput="updatePropNum('w',this.value)">
      <input type="number" class="prop-input" placeholder="H" value="${Math.round(el.h)}" oninput="updatePropNum('h',this.value)">
    </div>
    <div style="display:flex;gap:4px;margin-bottom:4px">
      <button class="btn-block btn-secondary-sm" onclick="moveLayer('up')" style="flex:1;padding:6px">↑ Subir</button>
      <button class="btn-block btn-secondary-sm" onclick="moveLayer('down')" style="flex:1;padding:6px">↓ Bajar</button>
    </div>`;

  container.innerHTML = lockHtml + labelHtml + specific + posHtml;
}

function parseOpacity(fill){
  if(!fill) return 1;
  const m=fill.match(/rgba?\([^)]+,\s*([\d.]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}

function updateFillOpacity(v){
  const el=state.elements.find(e=>e.id===state.currentId); if(!el) return;
  const cur=el.fill||'#003366';
  let r=0,g=0,b=0;
  if(cur.startsWith('#')){ r=parseInt(cur.slice(1,3),16);g=parseInt(cur.slice(3,5),16);b=parseInt(cur.slice(5,7),16); }
  else { const m=cur.match(/[\d.]+/g); if(m){r=m[0];g=m[1];b=m[2];} }
  el.fill=`rgba(${r},${g},${b},${v/100})`;
  document.getElementById('opval').textContent=v+'%';
  redraw();
}

function updateProp(key,val){ const el=state.elements.find(e=>e.id===state.currentId); if(!el) return; el[key]=val; redraw(); updateLayers(); }
function updatePropNum(key,val){ const el=state.elements.find(e=>e.id===state.currentId); if(!el) return; el[key]=parseFloat(val)||0; redraw(); }
function moveLayer(dir){
  const idx=state.elements.findIndex(e=>e.id===state.currentId); if(idx<0) return;
  saveUndo();
  if(dir==='up'&&idx<state.elements.length-1){ [state.elements[idx],state.elements[idx+1]]=[state.elements[idx+1],state.elements[idx]]; }
  else if(dir==='down'&&idx>0){ [state.elements[idx],state.elements[idx-1]]=[state.elements[idx-1],state.elements[idx]]; }
  redraw(); updateLayers();
}

// ═══════════════════════════════════════════════════════
//  PANEL TABS
// ═══════════════════════════════════════════════════════
function switchPanel(name,el){
  document.querySelectorAll('.panel-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['props','layers','designs'].forEach(n=>document.getElementById('panel-'+n).style.display=n===name?'':'none');
  if(name==='designs') loadDesigns();
}

// ═══════════════════════════════════════════════════════
//  SAVE & LOAD
// ═══════════════════════════════════════════════════════
async function saveDesign(){
  const name=document.getElementById('design-name-input').value.trim()||'Sin nombre';
  const cat=document.getElementById('design-category').value;
  const btn=document.getElementById('btn-save');
  btn.innerHTML='<span class="spinner"></span>';

  // generate thumbnail
  const thumbData = canvas.toDataURL('image/jpeg',0.5);

  const data={
    name, category:cat, format:state.format,
    bgColor:state.bgColor, bgImageData:state.bgImageData||null,
    elements:state.elements,
    active:true,
    thumbnail:thumbData,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    if(state.editingDesignId){
      await db.collection('ua_flyer_designs').doc(state.editingDesignId).update(data);
    } else {
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      const ref=await db.collection('ua_flyer_designs').add(data);
      state.editingDesignId=ref.id;
    }
    showToast('✓ Diseño guardado');
  } catch(e){ console.error(e); showToast('Error al guardar — revisá Firebase'); }
  btn.innerHTML='<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Guardar';
}

async function loadDesigns(){
  const el=document.getElementById('designs-list');
  el.innerHTML='<p style="font-size:11px;color:var(--gm);text-align:center;padding:16px 0">Cargando…</p>';
  try {
    const snap=await db.collection('ua_flyer_designs').orderBy('updatedAt','desc').get();
    if(snap.empty){ el.innerHTML='<p style="font-size:11px;color:var(--gm);text-align:center;padding:16px 0">No hay diseños aún.</p>'; return; }
    el.innerHTML=snap.docs.map(d=>{
      const data=d.data();
      return `<div class="design-item">
        ${data.thumbnail?`<img class="design-thumb" src="${data.thumbnail}" alt="">`:`<div class="design-thumb-ph">sin img</div>`}
        <div class="design-info">
          <div class="design-info-name">${data.name||'Sin nombre'}</div>
          <div class="design-info-cat">${data.category||''} · ${data.format||'story'}</div>
        </div>
        <div class="design-actions">
          <button class="design-act-btn" onclick="loadDesign('${d.id}')" title="Editar">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="design-act-btn" onclick="toggleDesignActive('${d.id}',${!data.active})" title="${data.active?'Desactivar':'Activar'}">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>${data.active?'<path d="M9 12l2 2 4-4"/>':'<line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}</svg>
          </button>
          <button class="design-act-btn del" onclick="deleteDesign('${d.id}')" title="Eliminar">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  } catch(e){ console.error(e); el.innerHTML='<p style="font-size:11px;color:var(--fucsia);text-align:center;padding:16px 0">Error al cargar diseños</p>'; }
}

async function loadDesign(id){
  try {
    const snap=await db.collection('ua_flyer_designs').doc(id).get();
    if(!snap.exists) return;
    const data=snap.data();
    state.editingDesignId=id;
    state.format=data.format||'story';
    state.bgColor=data.bgColor||'#002447';
    state.bgImageData=data.bgImageData||null;
    state.elements=data.elements||[];
    state.currentId=null;
    document.getElementById('design-name-input').value=data.name||'';
    document.getElementById('design-category').value=data.category||'General';
    const fmtEl=document.getElementById('fmt-'+state.format);
    if(fmtEl) setFormat(state.format,fmtEl);
    else setFormat('story',document.getElementById('fmt-story'));
    undoStack=[]; redoStack=[];
    redraw(); updateLayers(); updateProps();
    showToast('Diseño cargado: '+data.name);
  } catch(e){ console.error(e); }
}

async function toggleDesignActive(id,val){
  await db.collection('ua_flyer_designs').doc(id).update({active:val});
  loadDesigns();
}

async function deleteDesign(id){
  if(!confirm('¿Eliminar este diseño?')) return;
  await db.collection('ua_flyer_designs').doc(id).delete();
  if(state.editingDesignId===id){ newDesign(); }
  loadDesigns();
}

function newDesign(){
  state.elements=[]; state.currentId=null; state.editingDesignId=null;
  state.bgColor='#002447'; state.bgImageData=null;
  document.getElementById('design-name-input').value='Nuevo diseño';
  undoStack=[]; redoStack=[];
  setFormat('story',document.getElementById('fmt-story'));
  redraw(); updateLayers(); updateProps();
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════════════
function bindKeys(){
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){ e.preventDefault(); undo(); }
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){ e.preventDefault(); redo(); }
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveDesign(); }
    if(e.key==='Delete'||e.key==='Backspace') deleteSelected();
    if(e.key==='t'||e.key==='T') addText();
    if(e.key==='r'||e.key==='R') addShape('rect');
    if(!e.ctrlKey&&!e.metaKey){
      const el=state.elements.find(e2=>e2.id===state.currentId);
      if(el&&!el.locked){
        const step=e.shiftKey?10:1;
        if(e.key==='ArrowLeft'){e.preventDefault();el.x-=step;}
        if(e.key==='ArrowRight'){e.preventDefault();el.x+=step;}
        if(e.key==='ArrowUp'){e.preventDefault();el.y-=step;}
        if(e.key==='ArrowDown'){e.preventDefault();el.y+=step;}
        redraw();
      }
    }
  });
}

function setTool(t){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t)?.classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
